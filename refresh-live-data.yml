name: Refresh Live Snapshot Data

on:
  push:
    branches: [main]
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      BACKTEST_RANGE_5M: "60d"
      QPO_RANGE_5M: "60d"
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build static dashboard + trade history
        run: |
          python scripts/build_live_snapshot.py

      - name: Commit refreshed data
        run: |
          if git diff --quiet; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data trade_logs dashboard-fallback.json
          git commit -m "auto: refresh dashboard snapshot + trade history"
          git push
